name: Deploy D'Griffe

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-dgriffe
  cancel-in-progress: true

jobs:
  # 1) Testa (type-check + build) antes de liberar qualquer deploy.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  # 1b) Aplica o schema de segredos no Supabase (tabelas + RLS + seed).
  # Usa a Supabase Access Token (PAT) guardada como secret. Idempotente (IF NOT EXISTS).
  sync-supabase:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Aplicar schema no Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN não definido — pulando sync do banco."
            exit 0
          fi
          SQL=$(cat supabase/schema-segredos.sql)
          RESP=$(curl -fsSL -X POST "$SUPABASE_URL/rest/v1/sql" \
            -H "Authorization: Bearer ***" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "$(jq -n --arg q "$SQL" '{query:$q}')")
          echo "Resposta Supabase (segredos): $RESP"
          SQL2=$(cat supabase/schema-fidelidade.sql)
          RESP2=$(curl -fsSL -X POST "$SUPABASE_URL/rest/v1/sql" \
            -H "Authorization: Bearer ***" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "$(jq -n --arg q "$SQL2" '{query:$q}')")
          echo "Resposta Supabase (fidelidade): $RESP2"

  # 2) Deploy do FRONT no Cloudflare Pages.
  deploy-front:
    needs: [test, sync-supabase]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: appdgriffedois
          directory: ./dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # 3) Deploy do PROXY no Render.
  # O Render já faz auto-deploy direto do GitHub (a cada push na main), então
  # este passo é redundante/opcional. Se o RENDER_DEPLOY_HOOK não estiver
  # configurado, apenas avisamos e seguimos (não quebra o pipeline).
  deploy-backend:
    needs: [test, sync-supabase]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Trigger Render Deploy
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK não definido — o Render já faz auto-deploy do GitHub. Pulando."
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK" \
            -H "Authorization: Bearer ***" \
            -H "Accept: application/json"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
