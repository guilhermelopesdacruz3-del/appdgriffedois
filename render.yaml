# Render.com deployment config for the D'Griffe proxy/backend.
#
# Caminho B (produção): o servidor sobe como Web Service público.
# O app Android aponta para a URL pública via VITE_LOJA_INTEGRADA_PROXY_URL.
#
# Secrets necessários no painel do Render (Environment):
#   - LOJA_INTEGRADA_APP_KEY
#   - LOJA_INTEGRADA_API_KEY
#   - ADMIN_PASSWORD
#   - SUPABASE_URL
#   - SUPABASE_SERVICE_ROLE
#   - MP_ACCESS_TOKEN (Mercado Pago — etapa posterior)
#   - MP_PUBLIC_KEY
#
# O server lê server/.env em dev, mas no Render usamos as env vars do painel.

services:
  - type: web
    name: dgriffe-proxy
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOJA_INTEGRADA_APP_KEY
        sync: false
      - key: LOJA_INTEGRADA_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
