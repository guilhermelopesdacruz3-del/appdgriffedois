name: Build Android (APK + AAB)

# Gera APK e AAB assinados da D'Griffe para o app do cliente.
# Roda 100% na nuvem (GitHub Actions) — você NÃO precisa rodar nada no seu PC
# (o Android SDK/JDK não existe na sua máquina; tudo é compilado no runner Ubuntu).
#
# Como usar (só no navegador do GitHub):
# 1) Adicione o secret GH_TOKEN (PAT classic com escopo `repo`) no painel.
# 2) Actions > "Build Android" > Run workflow:
#      - job = gen-keystore  (RODE 1x — cria e salva o keystore assinado)
#      - job = build-aab     (gera o .aab  -> Play Store)   [artifact: dgriffe-aab]
#      - job = build-apk     (gera o .apk  -> teste/instalação direta) [artifact: dgriffe-apk]
# Os artefatos ficam em Artifacts e (em push) em Release (tags aab-N / apk-N).

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Qual job rodar"
        required: true
        default: "build-aab"
        type: choice
        options:
          - build-aab
          - build-apk
          - gen-keystore

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # 1) Gera o keystore de assinatura UMA vez e salva como secrets do repo.
  #    Usa `gh secret set` (criptografa com a chave pública do repo).
  #    Compartilhado por APK e AAB (mesma identidade de app).
  # ---------------------------------------------------------------------------
  gen-keystore:
    if: github.event.inputs.job == 'gen-keystore'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Gerar keystore
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'dgriffe2026' }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'dgriffe' }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD || 'dgriffe2026' }}
        run: |
          mkdir -p $HOME/ks
          keytool -genkeypair \
            -v -keystore $HOME/ks/dgriffe.keystore \
            -alias "$KEY_ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=D'Griffe Otica, OU=TI, O=D'Griffe, L=Sao Paulo, ST=SP, C=BR" \
            -storepass "$KS_PASS" -keypass "$KEY_PASS"
          echo "Keystore gerado."

      - name: Salvar secrets (gh secret set)
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'dgriffe2026' }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'dgriffe' }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD || 'dgriffe2026' }}
        run: |
          B64=$(base64 -w0 $HOME/ks/dgriffe.keystore)
          echo "$B64" | gh secret set ANDROID_KEYSTORE_BASE64
          echo "$KS_PASS" | gh secret set ANDROID_KEYSTORE_PASSWORD
          echo "$KEY_ALIAS" | gh secret set ANDROID_KEY_ALIAS
          echo "$KEY_PASS" | gh secret set ANDROID_KEY_PASSWORD
          echo "Secrets de assinatura salvos no repo."

  # ---------------------------------------------------------------------------
  # 2) Build do AAB assinado (Play Store).
  # ---------------------------------------------------------------------------
  build-aab:
    if: github.event.inputs.job == 'build-aab' || github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Android SDK
        uses: android-actions/setup-android@v3
      - name: Instalar dependências
        run: npm ci
      - name: Build do front (injeta URL do proxy)
        env:
          VITE_LOJA_INTEGRADA_PROXY_URL: ${{ secrets.PROXY_URL || 'https://exemplo.onrender.com/api/loja-integrada' }}
        run: npm run build
      - name: Capacitor add + sync android
        run: |
          npx cap add android --no-app-build 2>/dev/null || echo "android já existe"
          cp capacitor/build-extras.gradle android/app/build-extras.gradle
          npx cap sync android
      - name: Restaurar keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "::error::Keystore não encontrado. Rode o job 'gen-keystore' primeiro (Actions > Build Android > Run workflow > job=gen-keystore)."
            exit 1
          fi
          echo "$KS_B64" | base64 -d > android/app/dgriffe.keystore
          echo "storeFile=dgriffe.keystore" > android/keystore.properties
          echo "storePassword=$KS_PASS" >> android/keystore.properties
          echo "keyAlias=$KEY_ALIAS" >> android/keystore.properties
          echo "keyPassword=$KEY_PASS" >> android/keystore.properties
      - name: Build do AAB (release assinado)
        working-directory: android
        run: ./gradlew bundleRelease
      - name: Upload AAB (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: dgriffe-aab
          path: android/app/build/outputs/bundle/release/*.aab
      - name: Criar GitHub Release com o AAB
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: aab-${{ github.run_number }}
        run: |
          gh release create "$TAG" \
            android/app/build/outputs/bundle/release/*.aab \
            --title "D'Griffe AAB #${{ github.run_number }}" \
            --notes "Android App Bundle (assinado) gerado automaticamente." \
            || echo "Release já existe."

  # ---------------------------------------------------------------------------
  # 3) Build do APK assinado (teste / instalação direta no celular).
  #    Mesmo keystore do AAB -> mesma identidade de app.
  # ---------------------------------------------------------------------------
  build-apk:
    if: github.event.inputs.job == 'build-apk'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Android SDK
        uses: android-actions/setup-android@v3
      - name: Instalar dependências
        run: npm ci
      - name: Build do front (injeta URL do proxy)
        env:
          VITE_LOJA_INTEGRADA_PROXY_URL: ${{ secrets.PROXY_URL || 'https://exemplo.onrender.com/api/loja-integrada' }}
        run: npm run build
      - name: Capacitor add + sync android
        run: |
          npx cap add android --no-app-build 2>/dev/null || echo "android já existe"
          cp capacitor/build-extras.gradle android/app/build-extras.gradle
          npx cap sync android
      - name: Restaurar keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "::error::Keystore não encontrado. Rode o job 'gen-keystore' primeiro (Actions > Build Android > Run workflow > job=gen-keystore)."
            exit 1
          fi
          echo "$KS_B64" | base64 -d > android/app/dgriffe.keystore
          echo "storeFile=dgriffe.keystore" > android/keystore.properties
          echo "storePassword=$KS_PASS" >> android/keystore.properties
          echo "keyAlias=$KEY_ALIAS" >> android/keystore.properties
          echo "keyPassword=$KEY_PASS" >> android/keystore.properties
      - name: Build do APK (release assinado)
        working-directory: android
        run: ./gradlew assembleRelease
      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: dgriffe-apk
          path: android/app/build/outputs/apk/release/*.apk
      - name: Criar GitHub Release com o APK
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: apk-${{ github.run_number }}
        run: |
          gh release create "$TAG" \
            android/app/build/outputs/apk/release/*.apk \
            --title "D'Griffe APK #${{ github.run_number }}" \
            --notes "APK assinado (gerado automaticamente) para teste/instalação direta." \
            || echo "Release já existe."
