name: Build AAB (Android App Bundle)

# Gera o AAB assinado da D'Griffe para a Google Play Store.
# Roda 100% na nuvem (GitHub Actions) — você NÃO precisa rodar nada no seu PC.
#
# Como usar:
# 1) Adicione o secret GH_TOKEN (com escopo repo) no painel do GitHub.
# 2) Rode o job "gen-keystore" uma vez (aba Actions > Build AAB > Run workflow).
#    Ele cria o keystore e salva os secrets de assinatura automaticamente.
# 3) Rode o job "build-aab" (ou faça push na main) -> o .aab fica em Artifacts/Release.
#
# O .aab é enviado para a Play Console (Interno de testes / Produção).

on:
  workflow_dispatch:
    # Rode manualmente: primeiro "gen-keystore" (1x), depois "build-aab".
    # Não dispara no push para não falhar antes do keystore existir.

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # 1) Gera o keystore de assinatura UMA vez e salva como secrets do repo.
  # ---------------------------------------------------------------------------
  gen-keystore:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Gerar keystore
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'dgriffe2026' }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'dgriffe' }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD || 'dgriffe2026' }}
        run: |
          mkdir -p $HOME/ks
          keytool -genkeypair \
            -v -keystore $HOME/ks/dgriffe.keystore \
            -alias "$KEY_ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=D'Griffe Otica, OU=TI, O=D'Griffe, L=Sao Paulo, ST=SP, C=BR" \
            -storepass "$KS_PASS" -keypass "$KEY_PASS"
          echo "Keystore gerado."

      - name: Salvar secrets via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'dgriffe2026' }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'dgriffe' }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD || 'dgriffe2026' }}
          REPO: ${{ github.repository }}
        run: |
          B64=$(base64 -w0 $HOME/ks/dgriffe.keystore)
          put() {
            local name="$1"; local value="$2"
            curl -fsSL -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/secrets/$name" \
              -d "$(jq -n --arg v "$value" '{encrypted_value:$v}')" || echo "Falha ao salvar $name"
          }
          put ANDROID_KEYSTORE_BASE64 "$B64"
          put ANDROID_KEYSTORE_PASSWORD "$KS_PASS"
          put ANDROID_KEY_ALIAS "$KEY_ALIAS"
          put ANDROID_KEY_PASSWORD "$KEY_PASS"
          echo "Secrets de assinatura salvos no repo."

  # ---------------------------------------------------------------------------
  # 2) Build do AAB assinado.
  # ---------------------------------------------------------------------------
  build-aab:
    runs-on: ubuntu-latest
    needs: []   # roda independente do gen-keystore
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependências
        run: npm ci

      - name: Build do front (injeta URL do proxy)
        env:
          VITE_LOJA_INTEGRADA_PROXY_URL: ${{ secrets.PROXY_URL || 'https://exemplo.onrender.com/api/loja-integrada' }}
        run: npm run build

      - name: Capacitor add + sync android
        run: |
          npx cap add android --no-app-build 2>/dev/null || echo "android já existe"
          # build-extras.gradle sobrevive ao cap sync (fica fora de android/).
          cp capacitor/build-extras.gradle android/app/build-extras.gradle
          npx cap sync android

      - name: Restaurar keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "::warning::Keystore não encontrado. Rode o job gen-keystore primeiro."
            exit 1
          fi
          echo "$KS_B64" | base64 -d > android/app/dgriffe.keystore
          echo "storeFile=dgriffe.keystore" > android/keystore.properties
          echo "storePassword=$KS_PASS" >> android/keystore.properties
          echo "keyAlias=$KEY_ALIAS" >> android/keystore.properties
          echo "keyPassword=$KEY_PASS" >> android/keystore.properties

      - name: Build do AAB (release assinado)
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Upload AAB (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: dgriffe-aab
          path: android/app/build/outputs/bundle/release/*.aab

      - name: Criar GitHub Release com o AAB
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: aab-${{ github.run_number }}
        run: |
          gh release create "$TAG" \
            android/app/build/outputs/bundle/release/*.aab \
            --title "D'Griffe AAB #${{ github.run_number }}" \
            --notes "Android App Bundle (assinado) gerado automaticamente." \
            || echo "Release já existe."
