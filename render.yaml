# Render — serviço do PROXY (backend Express).
# Conecte este repo no Render e ele usa este arquivo automaticamente.
# Build: instala deps + builda o front (single-file) como artefato opcional.
# Start: sobe o proxy que também serve como ponte para a Loja Integrada.
services:
  - type: web
    name: dgriffe-proxy
    runtime: node
    plan: free
    region: oregon          # troque para a mais perto de você se quiser
    branch: main
    # Render usa o package.json raiz (type: module). Builda tudo.
    buildCommand: npm install && npm run build
    startCommand: node server/index.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "10000"      # o Render injeta a porta em runtime; isso é fallback
      - key: DEMO_MODE
        value: "false"
      - key: FRONTEND_ORIGIN
        sync: false          # defina no painel: https://SEU-SITE.netlify.app
      - key: ADMIN_PASSWORD
        sync: false          # DEFINA NO PAINEL — senha forte, nunca demo123
      - key: ADMIN_SECRET
        sync: false          # defina no painel (string longa aleatória)
      - key: LI_APP_KEY
        sync: false          # chave real da Loja Integrada
      - key: LI_API_KEY
        sync: false          # chave real da Loja Integrada
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false          # SERVICE_ROLE do Supabase (server-only)
      # MP_ACCESS_TOKEN / MP_PUBLIC_KEY são salvos pelo painel admin (vão ao Supabase).
      # Mantenha-os fora do repo.
