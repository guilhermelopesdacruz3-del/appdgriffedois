name: Deploy D'Griffe

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-dgriffe
  cancel-in-progress: true

jobs:
  # 1) Testa (type-check + build) antes de liberar qualquer deploy.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  # 1b) Aplica o schema de segredos no Supabase (tabelas + RLS + seed).
  # Usa a Supabase Access Token (PAT) guardada como secret. Idempotente (IF NOT EXISTS).
  sync-supabase:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Aplicar schema no Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN não definido — pulando sync do banco."
            exit 0
          fi
          SQL=$(cat supabase/schema-segredos.sql)
          RESP=$(curl -fsSL -X POST "$SUPABASE_URL/rest/v1/sql" \
            -H "Authorization: Bearer ***" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "$(jq -n --arg q "$SQL" '{query:$q}')")
          echo "Resposta Supabase (segredos): $RESP"
          SQL2=$(cat supabase/schema-fidelidade.sql)
          RESP2=$(curl -fsSL -X POST "$SUPABASE_URL/rest/v1/sql" \
            -H "Authorization: Bearer ***" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "$(jq -n --arg q "$SQL2" '{query:$q}')")
          echo "Resposta Supabase (fidelidade): $RESP2"

  # 2) Deploy do FRONT na Netlify (automático a cada push na main).
  deploy-front:
    needs: [test, sync-supabase]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./dist
          production-deploy: true
          enable-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        # VITE_LOJA_INTEGRADA_PROXY_URL deve estar definido nas env vars da Netlify.

  # 3) Deploy do PROXY no Render (trigger de deploy).
  deploy-backend:
    needs: [test, sync-supabase]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
