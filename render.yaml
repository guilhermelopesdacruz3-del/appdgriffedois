services:
  - type: web
    name: dgriffe-proxy
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install --prefix server && npm run build --prefix server && npm install && npm run build
    startCommand: node server/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOJA_INTEGRADA_APP_KEY
        sync: false
      - key: LOJA_INTEGRADA_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
